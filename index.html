<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aditya's Community Room</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="join-screen" id="joinScreen">

<div class="join-box">

<h2>Enter Your Name</h2>

<input 
type="text"
id="usernameInput"
placeholder="Your name"
>

<button id="joinBtn">
Join Community
</button>

</div>
</div>

<div class="chat-app" id="chatApp">

<div class="header">
<h1>Aditya's Community Room</h1>
</div>

<div class="chat-box" id="chatBox">

<div class="welcome" id="welcome">
Welcome to the community room 👋
</div>

</div>

<div class="input-area">

<input
type="text"
id="messageInput"
placeholder="Type message..."
>

<button id="sendBtn">
Send
</button>

</div>
</div>
<script type="module" src="Script.js">
</script>
</body>
</html>
