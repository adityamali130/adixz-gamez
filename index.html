<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>memory game</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --box-border: #333;
            --text-main: #fff;
            --text-dim: #666;
            
            /* 7 High-Saturated, Visible Colors */
            --c1: #ff3b3b; /* Red */
            --c2: #00ff41; /* Green */
            --c3: #33a1ff; /* Blue */
            --c4: #fffb00; /* Yellow */
            --c5: #ff00f7; /* Magenta */
            --c6: #00ffff; /* Cyan */
            --c7: #ff9500; /* Orange */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            touch-action: manipulation;
        }

        header {
            text-align: center;
            margin-top: 10px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.2rem;
            text-transform: lowercase;
            margin-bottom: 5px;
        }

        .status {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        /* Board - Max 3x3 Grid */
        #game-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
        }

        #board {
            display: grid;
            gap: 12px;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .box {
            border: 1px solid var(--box-border);
            border-radius: 4px;
            transition: border-color 0.15s;
            width: 100%;
            height: 100%;
        }

        /* Controls */
        #controls {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 30px 0;
        }

        .color-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-btn:active {
            transform: scale(0.85);
        }

        .color-btn.disabled {
            opacity: 0.1;
            pointer-events: none;
            filter: grayscale(1);
        }

        /* Overlays */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #overlay h2 {
            font-weight: 300;
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: lowercase;
        }

        #overlay p {
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        #restart-btn {
            background: none;
            border: 1px solid #fff;
            color: #fff;
            padding: 12px 40px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: lowercase;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            #controls {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                width: auto;
                gap: 15px;
            }
            .color-btn {
                width: 55px;
                height: 55px;
            }
            #board {
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>memory game</h1>
        <div class="status" id="status-text">level 1</div>
    </header>

    <main id="game-area">
        <div id="board"></div>
    </main>

    <section id="controls">
        <!-- JS generates 7 buttons here -->
    </section>

    <div id="overlay">
        <h2>game over</h2>
        <p id="result-text">level reached: 1</p>
        <button id="restart-btn">restart</button>
    </div>

    <script>
        const COLOR_VARS = [
            'var(--c1)', 'var(--c2)', 'var(--c3)', 
            'var(--c4)', 'var(--c5)', 'var(--c6)', 'var(--c7)'
        ];
        
        const SHOW_DURATION = 1500; // Fixed 1.5s
        const MAX_GRID_SIZE = 9;   // Fixed 3x3 max

        let level = 1;
        let sequence = []; // Array of { boxIndex, colorIndex }
        let playerIndex = 0;
        let isDisplaying = false;

        const boardEl = document.getElementById('board');
        const controlsEl = document.getElementById('controls');
        const statusEl = document.getElementById('status-text');
        const overlayEl = document.getElementById('overlay');
        const resultEl = document.getElementById('result-text');
        const restartBtn = document.getElementById('restart-btn');

        function init() {
            createButtons();
            startLevel();
        }

        function createButtons() {
            controlsEl.innerHTML = '';
            COLOR_VARS.forEach((color, idx) => {
                const btn = document.createElement('button');
                btn.className = 'color-btn';
                btn.style.backgroundColor = color;
                
                const handlePress = (e) => {
                    e.preventDefault();
                    if (!isDisplaying) handleInput(idx);
                };

                btn.addEventListener('mousedown', handlePress);
                btn.addEventListener('touchstart', handlePress);
                controlsEl.appendChild(btn);
            });
        }

        function startLevel() {
            isDisplaying = true;
            playerIndex = 0;
            statusEl.innerText = `level ${level}`;
            toggleButtons(false);

            // 1. Determine Grid Count
            // Grows with level until 9 (3x3)
            let boxCount;
            if (level === 1) boxCount = 1;
            else if (level <= 4) boxCount = 4; // 2x2
            else boxCount = 9; // 3x3

            renderBoard(boxCount);

            // 2. Generate Sequence
            sequence = [];
            if (level <= 7) {
                // Levels 1-7: Unique colors
                const availableColors = [0, 1, 2, 3, 4, 5, 6];
                shuffleArray(availableColors);
                
                for (let i = 0; i < level; i++) {
                    sequence.push({
                        boxIndex: Math.floor(Math.random() * boxCount),
                        colorIndex: availableColors[i]
                    });
                }
            } else {
                // Levels 8+: Repeated colors allowed
                for (let i = 0; i < level; i++) {
                    sequence.push({
                        boxIndex: Math.floor(Math.random() * boxCount),
                        colorIndex: Math.floor(Math.random() * 7)
                    });
                }
            }

            setTimeout(playSequence, 1000);
        }

        function renderBoard(count) {
            boardEl.innerHTML = '';
            const side = Math.ceil(Math.sqrt(count));
            boardEl.style.gridTemplateColumns = `repeat(${side}, 1fr)`;
            boardEl.style.gridTemplateRows = `repeat(${side}, 1fr)`;

            for (let i = 0; i < count; i++) {
                const box = document.createElement('div');
                box.className = 'box';
                box.id = `box-${i}`;
                boardEl.appendChild(box);
            }
        }

        async function playSequence() {
            for (let i = 0; i < sequence.length; i++) {
                const step = sequence[i];
                const box = document.getElementById(`box-${step.boxIndex}`);
                
                // Active State
                box.style.backgroundColor = COLOR_VARS[step.colorIndex];
                box.style.borderColor = '#fff';
                
                await new Promise(r => setTimeout(r, SHOW_DURATION));
                
                // Inactive State
                box.style.backgroundColor = 'transparent';
                box.style.borderColor = 'var(--box-border)';
                
                // Gap between steps
                await new Promise(r => setTimeout(r, 150));
            }
            
            isDisplaying = false;
            toggleButtons(true);
            statusEl.innerText = 'recall';
        }

        function handleInput(colorIdx) {
            const expected = sequence[playerIndex];
            
            if (colorIdx === expected.colorIndex) {
                // Correct
                const targetBox = document.getElementById(`box-${expected.boxIndex}`);
                targetBox.style.backgroundColor = COLOR_VARS[colorIdx];
                targetBox.style.borderColor = '#fff';
                
                playerIndex++;

                if (playerIndex === sequence.length) {
                    // Success
                    isDisplaying = true; // Block input
                    toggleButtons(false);
                    setTimeout(() => {
                        level++;
                        startLevel();
                    }, 1000);
                }
            } else {
                // Mistake
                triggerGameOver();
            }
        }

        function toggleButtons(enabled) {
            const btns = document.querySelectorAll('.color-btn');
            btns.forEach(b => b.classList.toggle('disabled', !enabled));
        }

        function triggerGameOver() {
            isDisplaying = true;
            overlayEl.style.display = 'flex';
            resultEl.innerText = `level reached: ${level}`;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        restartBtn.addEventListener('click', () => {
            level = 1;
            overlayEl.style.display = 'none';
            startLevel();
        });

        // Start
        window.onload = init;
    </script>
</body>
</html>
